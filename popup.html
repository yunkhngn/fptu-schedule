<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>FPTU Schedule</title>
  <link rel="stylesheet" href="popup.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body>
  <div class="popup-wrapper">
    <header class="popup-header">
      <h1>📅 FPTU Schedule</h1>
      <div class="popup-controls"></div>
    </header>

    <section id="examList" class="popup-list">
      <div class="tab-navigation">
        <button id="scheduleTabBtn" class="tab-btn">📚 Lịch học</button>
        <button id="upcomingTab" class="tab-btn active">🗓️ Kỳ thi</button>
      </div>
      
      <div id="examSyncLoading" class="exam-sync-feedback" hidden>Đang tải lịch thi…</div>
      <div id="examSyncError" class="exam-sync-feedback exam-sync-feedback--error" hidden>Không thể tải lịch thi. Mở trang lịch thi FAP và thử Đồng bộ lại.</div>
      
      <div id="upcomingExams" class="tab-content active">
        <!-- Upcoming exams will be populated here -->
      </div>
      
      <div id="completedExams" class="tab-content">
        <!-- Completed exams will be populated here -->
      </div>
      <div id="scheduleTab" class="tab-content">
        <!-- Class schedule will be populated here -->
      </div>
    </section>

    <div class="popup-actions">
      <div id="examActions" class="actions-row">
          <button id="syncButton" class="new-action-btn sync-btn" title="Đồng bộ lịch thi">
            <span class="button-text">📍 Đồng bộ lịch thi</span>
          </button>
          <button id="exportBtn" class="new-action-btn clear-btn" title="Tải xuống file .ics">
            <span class="button-text">📅 Tải xuống lịch</span>
          </button>
          <button id="settingsButton" class="new-action-btn download-btn" title="Cài đặt hiển thị">
            <span class="button-text">⚙️ Cài đặt</span>
          </button>
      </div>

      <div id="scheduleActions" class="actions-row" style="display:none;">
        <button id="syncScheduleBtn" class="new-action-btn sync-btn" title="Đồng bộ lịch học">
          <span class="button-text">✉️ Đồng bộ lịch học</span>
        </button>
        <button id="downloadBtn" class="new-action-btn download-btn" title="Tải xuống">
          <span class="button-text">📥 Tải lịch học</span>
        </button>
        <button id="clearBtn" class="new-action-btn clear-btn" title="Xoá lịch học">
          <span class="button-text">🗑️ Xoá</span>
        </button>
      </div>
    </div>

    <!-- Filter Modal -->
    <div id="filterModal" class="modal" style="display: none;">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Lọc lịch thi</h3>
          <button id="closeFilter" class="close-btn">&times;</button>
        </div>
        <div class="modal-body">
          <div class="filter-group">
            <label class="filter-item">
              <input type="checkbox" id="filterFE" checked>
              <span>FE (Final Exam)</span>
            </label>
            <label class="filter-item">
              <input type="checkbox" id="filterPE" checked>
              <span>PE (Practical Exam)</span>
            </label>
            <label class="filter-item">
              <input type="checkbox" id="filter2NDFE" checked>
              <span>2NDFE (Second Final Exam)</span>
            </label>
            <label class="filter-item">
              <input type="checkbox" id="filter2NDPE" checked>
              <span>2NDPE (Second Practical Exam)</span>
            </label>
          </div>
          <div class="filter-actions">
            <button id="selectAll" class="filter-btn">Chọn tất cả</button>
            <button id="deselectAll" class="filter-btn">Bỏ chọn tất cả</button>
            <button id="applyFilter" class="filter-btn apply-btn">Áp dụng</button>
          </div>
        </div>
      </div>
    </div>

    <footer class="popup-footer">
      <p>I 💛 FPTU • Phát triển bởi <a href="https://github.com/yunkhngn" target="_blank">@yunkhngn</a> • <a href="https://github.com/yunkhngn/fptu-examination" target="_blank">GitHub</a> • <a id="docsLink" href="https://yunkhngn.github.io/fptu-examination/" target="_blank" rel="noopener">Hướng dẫn</a></p>
    </footer>

    <script src="sanitize-utils.js"></script>
    <script src="popup.js"></script>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>FPTU Schedule</title>
  <link rel="stylesheet" href="popup.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body>
  <!-- SVG symbols: dùng với <use href="#icon-…"> -->
  <svg xmlns="http://www.w3.org/2000/svg" class="icon-sprite" aria-hidden="true" focusable="false">
    <symbol id="icon-calendar" viewBox="0 0 24 24">
      <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M8 2v4m8-4v4M3 10h18M5 4h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V6a2 2 0 012-2z"/>
    </symbol>
    <symbol id="icon-book" viewBox="0 0 24 24">
      <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M2 3h6a4 4 0 014 4 4 4 0 004-4h6v18H2V3z"/>
      <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M12 7v14"/>
    </symbol>
    <symbol id="icon-clipboard" viewBox="0 0 24 24">
      <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2M8 2h8v4H8V2zM9 12h6M9 16h6M9 8h2"/>
    </symbol>
    <symbol id="icon-refresh" viewBox="0 0 24 24">
      <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-9-9c2.52 0 4.93 1 6.74 2.74L21 8M21 3v5h-5"/>
    </symbol>
    <symbol id="icon-download" viewBox="0 0 24 24">
      <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
    </symbol>
    <symbol id="icon-sliders" viewBox="0 0 24 24">
      <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3"/>
    </symbol>
    <symbol id="icon-trash" viewBox="0 0 24 24">
      <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6"/>
    </symbol>
    <symbol id="icon-x" viewBox="0 0 24 24">
      <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M18 6L6 18M6 6l12 12"/>
    </symbol>
    <symbol id="icon-heart" viewBox="0 0 24 24">
      <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
    </symbol>
    <symbol id="icon-external" viewBox="0 0 24 24">
      <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/>
    </symbol>
  </svg>

  <div class="popup-wrapper">
    <header class="popup-header">
      <div class="popup-header__brand">
        <div class="popup-header__mark" aria-hidden="true">
          <svg class="icon icon--md"><use href="#icon-calendar"/></svg>
        </div>
        <div class="popup-header__titles">
          <h1 class="popup-header__title">FPTU Schedule</h1>
          <p class="popup-header__subtitle">Lịch học &amp; lịch thi từ FAP</p>
        </div>
      </div>
    </header>

    <section id="examList" class="popup-list">
      <div class="tab-navigation" role="tablist">
        <button type="button" id="scheduleTabBtn" class="tab-btn" role="tab" aria-selected="false">
          <svg class="icon" aria-hidden="true"><use href="#icon-book"/></svg>
          <span class="tab-btn__text">Lịch học</span>
        </button>
        <button type="button" id="upcomingTab" class="tab-btn active" role="tab" aria-selected="true">
          <svg class="icon" aria-hidden="true"><use href="#icon-clipboard"/></svg>
          <span class="tab-btn__text">Kỳ thi</span>
        </button>
      </div>

      <div id="examSyncLoading" class="exam-sync-feedback" hidden>Đang tải lịch thi…</div>
      <div id="examSyncError" class="exam-sync-feedback exam-sync-feedback--error" hidden>Không thể tải lịch thi. Mở trang lịch thi FAP và thử Đồng bộ lại.</div>

      <div id="upcomingExams" class="tab-content active"></div>
      <div id="completedExams" class="tab-content"></div>
      <div id="scheduleTab" class="tab-content"></div>
    </section>

    <div class="popup-actions">
      <div id="examActions" class="actions-row">
        <button type="button" id="syncButton" class="action-btn action-btn--secondary" title="Đồng bộ lịch thi">
          <svg class="icon" aria-hidden="true"><use href="#icon-refresh"/></svg>
          <span class="action-btn__label">Đồng bộ lịch thi</span>
        </button>
        <button type="button" id="exportBtn" class="action-btn action-btn--primary" title="Tải xuống file .ics">
          <svg class="icon" aria-hidden="true"><use href="#icon-download"/></svg>
          <span class="action-btn__label">Tải .ics</span>
        </button>
        <button type="button" id="settingsButton" class="action-btn action-btn--ghost" title="Lọc loại kỳ thi">
          <svg class="icon" aria-hidden="true"><use href="#icon-sliders"/></svg>
          <span class="action-btn__label">Lọc</span>
        </button>
      </div>

      <div id="scheduleActions" class="actions-row" hidden>
        <button type="button" id="syncScheduleBtn" class="action-btn action-btn--secondary" title="Đồng bộ lịch học">
          <svg class="icon" aria-hidden="true"><use href="#icon-refresh"/></svg>
          <span class="action-btn__label">Đồng bộ lịch học</span>
        </button>
        <button type="button" id="downloadBtn" class="action-btn action-btn--primary" title="Tải lịch học .ics">
          <svg class="icon" aria-hidden="true"><use href="#icon-download"/></svg>
          <span class="action-btn__label">Tải .ics</span>
        </button>
        <button type="button" id="clearBtn" class="action-btn action-btn--danger" title="Xoá lịch học đã lưu">
          <svg class="icon" aria-hidden="true"><use href="#icon-trash"/></svg>
          <span class="action-btn__label">Xoá</span>
        </button>
      </div>
    </div>

    <div id="filterModal" class="modal" style="display: none;" role="dialog" aria-modal="true" aria-labelledby="filterModalTitle">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="filterModalTitle">Lọc lịch thi</h3>
          <button type="button" id="closeFilter" class="close-btn" aria-label="Đóng">
            <svg class="icon" aria-hidden="true"><use href="#icon-x"/></svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="filter-group">
            <label class="filter-item">
              <input type="checkbox" id="filterFE" checked>
              <span>FE (Final Exam)</span>
            </label>
            <label class="filter-item">
              <input type="checkbox" id="filterPE" checked>
              <span>PE (Practical Exam)</span>
            </label>
            <label class="filter-item">
              <input type="checkbox" id="filter2NDFE" checked>
              <span>2NDFE (Second Final Exam)</span>
            </label>
            <label class="filter-item">
              <input type="checkbox" id="filter2NDPE" checked>
              <span>2NDPE (Second Practical Exam)</span>
            </label>
          </div>
          <div class="filter-actions">
            <button type="button" id="selectAll" class="filter-btn">Chọn tất cả</button>
            <button type="button" id="deselectAll" class="filter-btn">Bỏ chọn</button>
            <button type="button" id="applyFilter" class="filter-btn apply-btn">Áp dụng</button>
          </div>
        </div>
      </div>
    </div>

    <footer class="popup-footer">
      <p class="popup-footer__line">
        <span class="footer-heart" aria-hidden="true">
          <svg class="icon icon--xs"><use href="#icon-heart"/></svg>
        </span>
        <span>FPTU</span>
        <span class="footer-dot">·</span>
        <span>Phát triển bởi <a href="https://github.com/yunkhngn" target="_blank" rel="noopener">@yunkhngn</a></span>
        <span class="footer-dot">·</span>
        <a href="https://github.com/yunkhngn/fptu-examination" target="_blank" rel="noopener">GitHub</a>
        <span class="footer-dot">·</span>
        <a id="docsLink" href="https://yunkhngn.github.io/fptu-examination/" target="_blank" rel="noopener">Hướng dẫn</a>
      </p>
    </footer>

    <script src="sanitize-utils.js"></script>
    <script src="popup.js"></script>
  </div>
</body>
</html>
